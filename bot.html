<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PONG — VS BOT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: monospace;
  }
  #screen { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  /* DIFFICULTY MENU */
  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
  #menu h1 { font-size: 72px; font-weight: 900; letter-spacing: 12px; }
  .label { font-size: 11px; color: #888; letter-spacing: 3px; text-align: center; }
  .diff-group { display: flex; gap: 8px; }
  .diff-btn {
    padding: 10px 16px;
    border: 2px solid #fff;
    background: #000;
    color: #fff;
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .diff-btn.active, .diff-btn:hover { background: #fff; color: #000; }
  #start-btn {
    width: 280px;
    padding: 14px;
    background: #fff;
    color: #000;
    border: none;
    font-family: monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
  }
  #start-btn:hover { background: #ccc; }
  .hint { font-size: 11px; color: #555; line-height: 2.2; text-align: center; }
  .back-link { font-size: 11px; color: #555; text-decoration: none; letter-spacing: 2px; }
  .back-link:hover { color: #fff; }

  /* GAME */
  #game { display: none; flex-direction: column; align-items: center; gap: 12px; }
  .scoreboard { display: flex; justify-content: space-between; align-items: center; width: 760px; }
  .score-box { text-align: center; min-width: 120px; }
  .score-num { font-size: 52px; font-weight: 900; }
  .score-lbl { font-size: 11px; color: #888; letter-spacing: 2px; }
  #status { font-size: 12px; color: #888; text-align: center; min-width: 160px; letter-spacing: 2px; }
  #canvas { border: 2px solid #fff; display: block; background: #000; }
  .game-footer { display: flex; justify-content: space-between; align-items: center; width: 760px; }
  #back-btn {
    padding: 6px 18px;
    border: 2px solid #fff;
    background: #000;
    color: #fff;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
  }
  #back-btn:hover { background: #fff; color: #000; }
  .footer-hint { font-size: 10px; color: #555; }

  /* WIN */
  #win { display: none; flex-direction: column; align-items: center; gap: 22px; }
  #win-title { font-size: 52px; font-weight: 900; letter-spacing: 6px; }
  #win-score { font-size: 18px; color: #888; }
  .win-btns { display: flex; gap: 12px; }
  .win-btn {
    padding: 12px 26px;
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    border: 2px solid #fff;
  }
  #btn-again { background: #fff; color: #000; }
  #btn-again:hover { background: #ccc; }
  #btn-menu { background: #000; color: #fff; text-decoration: none; display: flex; align-items: center; }
  #btn-menu:hover { background: #fff; color: #000; }
</style>
</head>
<body>
<div id="screen">

  <!-- DIFFICULTY MENU -->
  <div id="menu">
    <h1>VS BOT</h1>
    <div>
      <p class="label" style="margin-bottom:10px;">DIFFICULTY</p>
      <div class="diff-group">
        <button class="diff-btn" data-speed="3" data-err="80">EASY</button>
        <button class="diff-btn active" data-speed="5" data-err="40">MEDIUM</button>
        <button class="diff-btn" data-speed="7" data-err="15">HARD</button>
        <button class="diff-btn" data-speed="9" data-err="3">INSANE</button>
      </div>
    </div>
    <button id="start-btn">PLAY</button>
    <p class="hint">↑ / ↓ to move &nbsp;|&nbsp; SPACE to pause<br>First to 7 wins</p>
    <a href="index.html" class="back-link">← BACK</a>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="scoreboard">
      <div class="score-box">
        <div id="score-p" class="score-num">0</div>
        <div class="score-lbl">YOU</div>
      </div>
      <div id="status">PRESS SPACE</div>
      <div class="score-box">
        <div id="score-b" class="score-num">0</div>
        <div class="score-lbl">BOT</div>
      </div>
    </div>
    <canvas id="canvas" width="760" height="480"></canvas>
    <div class="game-footer">
      <button id="back-btn">← MENU</button>
      <span class="footer-hint">↑ / ↓ move &nbsp; SPACE pause</span>
    </div>
  </div>

  <!-- WIN -->
  <div id="win">
    <div id="win-title"></div>
    <div id="win-score"></div>
    <div class="win-btns">
      <button class="win-btn" id="btn-again">PLAY AGAIN</button>
      <a class="win-btn" id="btn-menu" href="index.html">MENU</a>
    </div>
  </div>

</div>
<script>
const menuEl = document.getElementById('menu');
const gameEl = document.getElementById('game');
const winEl  = document.getElementById('win');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 760, H = 480;
const PW = 12, PH = 80, BS = 10;

let botSpeed = 5, botErr = 40;
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    botSpeed = +btn.dataset.speed;
    botErr   = +btn.dataset.err;
  });
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('back-btn').addEventListener('click', goMenu);
document.getElementById('btn-again').addEventListener('click', startGame);

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let player, bot, ball, scoreP, scoreB, paused, running, rafId;

function makeBall(dir) {
  const angle = (Math.random() * 0.6 - 0.3);
  const spd = 5;
  return {
    x: W / 2 - BS / 2,
    y: H / 2 - BS / 2,
    vx: dir * spd * Math.cos(angle),
    vy: spd * Math.sin(angle),
    spd: spd
  };
}

function goMenu() {
  cancelAnimationFrame(rafId);
  running = false;
  menuEl.style.display = 'flex';
  gameEl.style.display = 'none';
  winEl.style.display  = 'none';
}

function startGame() {
  menuEl.style.display = 'none';
  winEl.style.display  = 'none';
  gameEl.style.display = 'flex';
  scoreP = 0; scoreB = 0;
  player = { x: 20,          y: H/2 - PH/2 };
  bot    = { x: W - 20 - PW, y: H/2 - PH/2 };
  paused = true;
  running = true;
  ball = makeBall(1);
  document.getElementById('score-p').textContent = '0';
  document.getElementById('score-b').textContent = '0';
  document.getElementById('status').textContent = 'PRESS SPACE';
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('status').textContent = paused ? 'PAUSED' : '';
}

function loop() {
  if (!running) return;
  if (!paused) update();
  draw();
  rafId = requestAnimationFrame(loop);
}

function update() {
  // Player (arrow keys)
  if ((keys['ArrowUp'])   && player.y > 0)       player.y -= 6;
  if ((keys['ArrowDown']) && player.y < H - PH)   player.y += 6;

  // Bot AI
  const botCenter = bot.y + PH / 2;
  const target    = ball.y + BS / 2 + (Math.random() - 0.5) * botErr;
  const diff      = target - botCenter;
  bot.y += Math.sign(diff) * Math.min(Math.abs(diff), botSpeed);
  bot.y = Math.max(0, Math.min(H - PH, bot.y));

  // Ball move
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.y <= 0)      { ball.y = 0;      ball.vy =  Math.abs(ball.vy); }
  if (ball.y + BS >= H) { ball.y = H - BS; ball.vy = -Math.abs(ball.vy); }

  // Paddle hit
  function hit(px, py, side) {
    if (ball.x + BS > px && ball.x < px + PW &&
        ball.y + BS > py && ball.y < py + PH) {
      const rel   = (ball.y + BS / 2 - py) / PH;
      const angle = (rel - 0.5) * Math.PI * 0.6;
      ball.spd    = Math.min(ball.spd + 0.3, 15);
      ball.vx     = side * ball.spd * Math.cos(angle);
      ball.vy     = ball.spd * Math.sin(angle);
      ball.x      = (side === 1) ? px + PW : px - BS;
    }
  }
  hit(player.x, player.y,  1);
  hit(bot.x,    bot.y,    -1);

  // Score
  if (ball.x + BS < 0) {
    scoreB++;
    document.getElementById('score-b').textContent = scoreB;
    if (!checkWin()) { ball = makeBall(1);  paused = true; document.getElementById('status').textContent = 'PRESS SPACE'; }
  }
  if (ball.x > W) {
    scoreP++;
    document.getElementById('score-p').textContent = scoreP;
    if (!checkWin()) { ball = makeBall(-1); paused = true; document.getElementById('status').textContent = 'PRESS SPACE'; }
  }
}

function checkWin() {
  if (scoreP >= 7 || scoreB >= 7) {
    running = false;
    cancelAnimationFrame(rafId);
    winEl.style.display  = 'flex';
    gameEl.style.display = 'none';
    const won = scoreP >= 7;
    document.getElementById('win-title').textContent = won ? 'YOU WIN!' : 'YOU LOSE!';
    document.getElementById('win-score').textContent = scoreP + ' — ' + scoreB;
    return true;
  }
  return false;
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.setLineDash([8, 12]);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#fff';
  ctx.fillRect(player.x, player.y, PW, PH);
  ctx.fillRect(bot.x,    bot.y,    PW, PH);
  ctx.fillRect(Math.round(ball.x), Math.round(ball.y), BS, BS);
}
</script>
</body>
</html>
