<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>PONG — ONLINE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:8px;overflow:hidden;}

  .screen{display:none;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:800px;}
  .screen.active{display:flex;}
  h1{font-size:clamp(40px,10vw,64px);font-weight:900;letter-spacing:clamp(6px,2vw,10px);}
  .sub{font-size:11px;color:#555;letter-spacing:3px;margin-top:-14px;}

  /* user bar */
  .user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:340px;padding:8px 12px;border:1px solid #222;font-size:11px;}
  .user-nick{letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
  .user-link{color:#888;text-decoration:none;font-size:10px;letter-spacing:1px;}
  .user-link:hover{color:#fff;}

  /* tabs */
  .tabs{display:flex;width:100%;max-width:340px;}
  .tab{flex:1;padding:11px;text-align:center;font-family:monospace;font-size:12px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;background:#000;color:#fff;}
  .tab+.tab{border-left:none;}
  .tab.active{background:#fff;color:#000;}

  /* panel */
  .panel{width:100%;max-width:340px;border:2px solid #fff;border-top:none;padding:18px;display:flex;flex-direction:column;gap:12px;}
  .panel-label{font-size:10px;color:#888;letter-spacing:3px;}
  .code-box{font-size:28px;font-weight:900;letter-spacing:8px;text-align:center;padding:10px;border:2px solid #555;background:#111;min-height:54px;display:flex;align-items:center;justify-content:center;}
  .code-box.dim{font-size:12px;color:#555;letter-spacing:2px;font-weight:normal;}
  input[type=text]{width:100%;padding:10px;background:#111;border:2px solid #555;color:#fff;font-family:monospace;font-size:15px;letter-spacing:4px;text-transform:uppercase;text-align:center;}
  input:focus{outline:none;border-color:#fff;}
  input::placeholder{color:#333;font-size:11px;letter-spacing:2px;}
  .btn{width:100%;padding:11px;background:#fff;color:#000;border:none;font-family:monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;touch-action:manipulation;}
  .btn:hover,.btn:active{background:#ccc;}
  .btn.outline{background:#000;color:#fff;border:2px solid #fff;}
  .btn.outline:hover,.btn.outline:active{background:#fff;color:#000;}
  .btn.sm{font-size:11px;padding:8px;}

  /* room list */
  #room-list{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto;}
  .room-empty{font-size:11px;color:#555;text-align:center;padding:8px;}
  .room-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid #333;}
  .room-code{font-size:13px;letter-spacing:3px;}
  .join-r{padding:4px 12px;background:#fff;color:#000;border:none;font-family:monospace;font-size:10px;cursor:pointer;touch-action:manipulation;}

  #lobby-status{font-size:11px;letter-spacing:2px;text-align:center;min-height:16px;color:#888;}
  #lobby-status.err{color:#f55;}
  #lobby-status.ok{color:#5f5;}
  .back-link{font-size:11px;color:#444;text-decoration:none;letter-spacing:2px;}
  .back-link:hover{color:#fff;}

  /* ── GAME ─────────────────────────── */
  #screen-game{padding:4px;justify-content:flex-start;}
  .scoreboard{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:800px;}
  .score-box{text-align:center;min-width:80px;}
  .score-num{font-size:clamp(32px,8vw,52px);font-weight:900;}
  .score-lbl{font-size:10px;color:#888;letter-spacing:2px;}
  #g-status{font-size:11px;color:#888;letter-spacing:2px;text-align:center;flex:1;padding:0 8px;}

  /* Canvas wrapper — scales to viewport */
  #canvas-wrap{position:relative;width:100%;max-width:800px;touch-action:none;}
  #canvas{display:block;width:100%;height:auto;border:2px solid #fff;background:#000;touch-action:none;}

  /* Mobile touch paddle buttons */
  .touch-controls{display:none;width:100%;max-width:800px;gap:8px;}
  @media(pointer:coarse){.touch-controls{display:flex;}}
  .touch-btn{
    flex:1;height:60px;background:#111;border:2px solid #fff;
    font-family:monospace;font-size:20px;cursor:pointer;
    touch-action:manipulation;user-select:none;
    display:flex;align-items:center;justify-content:center;
  }
  .touch-btn:active{background:#333;}

  .gfooter{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:800px;}
  .gfooter-btn{padding:6px 14px;border:2px solid #fff;background:#000;color:#fff;font-family:monospace;font-size:11px;letter-spacing:2px;cursor:pointer;touch-action:manipulation;}
  .gfooter-btn:active,.gfooter-btn:hover{background:#fff;color:#000;}
  .gfooter-hint{font-size:10px;color:#444;}

  /* ── WIN ──────────────────────────── */
  #win-title{font-size:clamp(36px,10vw,52px);font-weight:900;letter-spacing:6px;}
  #win-score{font-size:18px;color:#888;}
  .win-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .win-btn{padding:12px 22px;font-family:monospace;font-size:12px;letter-spacing:2px;cursor:pointer;border:2px solid #fff;touch-action:manipulation;}
  #wbtn-rematch{background:#fff;color:#000;}
  #wbtn-rematch:hover{background:#ccc;}
  #wbtn-lobby{background:#000;color:#fff;}
  #wbtn-lobby:hover{background:#fff;color:#000;}
</style>
</head>
<body>

<!-- ── LOBBY ─────────────────────────────────────────── -->
<div id="screen-lobby" class="screen active">
  <h1>ONLINE</h1>
  <p class="sub">FIREBASE REAL TIME</p>

  <div class="user-bar" id="user-bar" style="display:none">
    <span class="user-nick" id="bar-nick">—</span>
    <a href="auth.html" class="user-link" id="bar-action">SIGN OUT</a>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-private" onclick="switchTab('private')">PRIVATE</div>
    <div class="tab"        id="tab-public"  onclick="switchTab('public')">PUBLIC</div>
  </div>

  <div class="panel" id="panel-private">
    <div class="panel-label">CREATE A PRIVATE ROOM</div>
    <div class="code-box dim" id="my-code">—</div>
    <button class="btn sm" onclick="createPrivate()">CREATE ROOM</button>
    <button class="btn sm outline" onclick="copyCode()">COPY CODE</button>
    <div class="panel-label" style="margin-top:4px">JOIN A PRIVATE ROOM</div>
    <input type="text" id="priv-input" maxlength="6" placeholder="ENTER CODE" autocomplete="off">
    <button class="btn" onclick="joinPrivate()">JOIN</button>
  </div>

  <div class="panel" id="panel-public" style="display:none">
    <div class="panel-label">OPEN PUBLIC ROOMS</div>
    <div id="room-list"><div class="room-empty">Press refresh to search.</div></div>
    <button class="btn sm outline" onclick="refreshRooms()">↻ REFRESH</button>
    <div class="panel-label" style="margin-top:4px">OR CREATE ONE</div>
    <button class="btn" onclick="createPublic()">CREATE PUBLIC ROOM</button>
  </div>

  <div id="lobby-status"></div>
  <p style="font-size:10px;color:#333;letter-spacing:1px;text-align:center">↑/↓ or touch buttons to move &nbsp;|&nbsp; First to 7 wins</p>
  <a href="index.html" class="back-link">← BACK</a>
</div>

<!-- ── GAME ──────────────────────────────────────────── -->
<div id="screen-game" class="screen">
  <div class="scoreboard">
    <div class="score-box">
      <div id="score-h" class="score-num">0</div>
      <div id="lbl-h" class="score-lbl">—</div>
    </div>
    <div id="g-status">—</div>
    <div class="score-box">
      <div id="score-g" class="score-num">0</div>
      <div id="lbl-g" class="score-lbl">—</div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas" width="760" height="480"></canvas>
  </div>
  <!-- Mobile touch controls -->
  <div class="touch-controls">
    <button class="touch-btn" id="touch-up">▲</button>
    <button class="touch-btn" id="touch-down">▼</button>
  </div>
  <div class="gfooter">
    <button class="gfooter-btn" onclick="leaveGame()">← LOBBY</button>
    <span class="gfooter-hint" id="desktop-hint">↑/↓ move &nbsp;|&nbsp; SPACE pause</span>
  </div>
</div>

<!-- ── WIN ───────────────────────────────────────────── -->
<div id="screen-win" class="screen">
  <div id="win-title"></div>
  <div id="win-score"></div>
  <div class="win-btns">
    <button class="win-btn" id="wbtn-rematch" onclick="requestRematch()">REMATCH</button>
    <button class="win-btn" id="wbtn-lobby"   onclick="leaveGame()">LOBBY</button>
  </div>
</div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove, update, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ─── Config ──────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",
  authDomain:"pong-online-18210.firebaseapp.com",
  databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",
  projectId:"pong-online-18210",
  storageBucket:"pong-online-18210.firebasestorage.app",
  messagingSenderId:"897676900222",
  appId:"1:897676900222:web:7933fd119d9b573b9d252f"
};
const fbApp=initializeApp(firebaseConfig);
const db=getDatabase(fbApp);
const auth=getAuth(fbApp);

// ─── Constants ───────────────────────────────────────
const W=760,H=480,PW=12,PH=80,BS=10,WIN=7,TICK=1000/60;

// ─── Auth state ──────────────────────────────────────
let currentUser=null;
let currentNick='Player';
let currentVerified=false;

onAuthStateChanged(auth,async user=>{
  currentUser=user;
  if(user){
    const snap=await get(ref(db,`users/${user.uid}`));
    const d=snap.val()||{};
    currentNick=d.nickname||user.displayName||'Player';
    currentVerified=d.verified||false;
    document.getElementById('user-bar').style.display='flex';
    document.getElementById('bar-nick').textContent=currentNick;
    const act=document.getElementById('bar-action');
    act.textContent='SIGN OUT';
    act.onclick=async e=>{e.preventDefault();await signOut(auth);window.location.href='auth.html';};
  } else {
    document.getElementById('user-bar').style.display='none';
    currentNick='Player';
    currentVerified=false;
  }
});

// ─── Game state ──────────────────────────────────────
let isHost=false,roomId=null,myRole=null;
let running=false,paused=true,rafId=null;
let hostY=H/2-PH/2,guestY=H/2-PH/2,myY=H/2-PH/2;
let ball=null,scoreH=0,scoreG=0;
let accumulator=0,lastTick=0;
let rematchVotes=0,publicInterval=null;
let stateUnsub=null,inputUnsub=null,signalUnsub=null;

// ─── Input: keyboard ─────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();togglePause();}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ─── Input: touch buttons ────────────────────────────
const touchState={up:false,down:false};
function setupTouch(){
  const up=document.getElementById('touch-up');
  const dn=document.getElementById('touch-down');
  ['touchstart','mousedown'].forEach(ev=>{
    up.addEventListener(ev,e=>{e.preventDefault();touchState.up=true;},{passive:false});
    dn.addEventListener(ev,e=>{e.preventDefault();touchState.down=true;},{passive:false});
  });
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>{
    up.addEventListener(ev,()=>{touchState.up=false;});
    dn.addEventListener(ev,()=>{touchState.down=false;});
  });
  // SPACE on tap canvas (pause)
  document.getElementById('canvas').addEventListener('click',()=>togglePause());
}
setupTouch();

// ─── DB refs ─────────────────────────────────────────
const roomRef  = id=>ref(db,`rooms/${id}`);
const stateRef = id=>ref(db,`rooms/${id}/state`);
const inputRef = (id,role)=>ref(db,`rooms/${id}/input/${role}`);

function randCode(n=6){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';for(let i=0;i<n;i++)s+=c[Math.random()*c.length|0];return s;
}

// ─── UI helpers ──────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setStatus(msg,cls=''){
  const e=document.getElementById('lobby-status');e.textContent=msg;e.className=cls||'';
}
function setGStatus(msg){document.getElementById('g-status').textContent=msg;}

// ─── Tab switch ──────────────────────────────────────
window.switchTab=function(tab){
  document.getElementById('tab-private').classList.toggle('active',tab==='private');
  document.getElementById('tab-public').classList.toggle('active',tab==='public');
  document.getElementById('panel-private').style.display=tab==='private'?'flex':'none';
  document.getElementById('panel-public').style.display =tab==='public' ?'flex':'none';
  if(tab==='public')refreshRooms();
};

window.copyCode=function(){
  if(!roomId)return;
  navigator.clipboard.writeText(roomId).then(()=>setStatus('Copied!','ok'));
};

// ─── Private create ──────────────────────────────────
window.createPrivate=async function(){
  const id=randCode(6);
  isHost=true;myRole='host';roomId=id;
  await set(roomRef(id),{host:'waiting',guest:null,state:null,created:Date.now()});
  document.getElementById('my-code').textContent=id;
  document.getElementById('my-code').classList.remove('dim');
  setStatus('Room '+id+' ready — share your code!','ok');
  const gjRef=ref(db,`rooms/${id}/guest`);
  onValue(gjRef,snap=>{
    if(snap.val()==='joined'){off(gjRef);setStatus('Guest joined!','ok');beginGame();}
  });
};

// ─── Private join ────────────────────────────────────
window.joinPrivate=async function(){
  const id=document.getElementById('priv-input').value.trim().toUpperCase();
  if(id.length<4){setStatus('Enter a valid code','err');return;}
  const snap=await get(roomRef(id));
  if(!snap.exists()){setStatus('Room not found','err');return;}
  if(snap.val().guest==='joined'){setStatus('Room is full','err');return;}
  isHost=false;myRole='guest';roomId=id;
  await update(roomRef(id),{guest:'joined'});
  setStatus('Joined '+id+'!','ok');
  beginGame();
};

// ─── Public create ───────────────────────────────────
window.createPublic=async function(){
  const id=randCode(6);
  isHost=true;myRole='host';roomId=id;
  const now=Date.now();
  await set(roomRef(id),{host:'waiting',guest:null,state:null,created:now});
  await set(ref(db,`public/${id}`),{id,created:now});
  document.getElementById('my-code').textContent=id;
  document.getElementById('my-code').classList.remove('dim');
  setStatus('Public room '+id+' open...','ok');
  publicInterval=setInterval(()=>set(ref(db,`public/${id}/ts`),Date.now()),20000);
  const gjRef=ref(db,`rooms/${id}/guest`);
  onValue(gjRef,snap=>{
    if(snap.val()==='joined'){
      off(gjRef);clearInterval(publicInterval);
      remove(ref(db,`public/${id}`));
      setStatus('Opponent joined!','ok');beginGame();
    }
  });
};

window.refreshRooms=async function(){
  const el=document.getElementById('room-list');
  el.innerHTML='<div class="room-empty">Searching...</div>';
  const snap=await get(ref(db,'public'));
  if(!snap.exists()||!snap.val()){el.innerHTML='<div class="room-empty">No open rooms found.</div>';return;}
  const rooms=Object.values(snap.val()).filter(r=>Date.now()-r.created<120000);
  if(!rooms.length){el.innerHTML='<div class="room-empty">No open rooms found.</div>';return;}
  el.innerHTML='';
  rooms.forEach(r=>{
    const row=document.createElement('div');row.className='room-row';
    row.innerHTML=`<span class="room-code">${r.id}</span><button class="join-r" onclick="joinPublicRoom('${r.id}')">JOIN</button>`;
    el.appendChild(row);
  });
};

window.joinPublicRoom=async function(id){
  const snap=await get(roomRef(id));
  if(!snap.exists()){setStatus('Room no longer available','err');return;}
  if(snap.val().guest==='joined'){setStatus('Room is full','err');return;}
  isHost=false;myRole='guest';roomId=id;
  await update(roomRef(id),{guest:'joined'});
  await remove(ref(db,`public/${id}`));
  setStatus('Joined!','ok');beginGame();
};

// ─── Game ────────────────────────────────────────────
function makeBall(dir){
  const a=(Math.random()*0.6-0.3),spd=5;
  return{x:W/2-BS/2,y:H/2-BS/2,vx:dir*spd*Math.cos(a),vy:spd*Math.sin(a),spd};
}

function beginGame(){
  scoreH=0;scoreG=0;rematchVotes=0;
  myY=H/2-PH/2;hostY=H/2-PH/2;guestY=H/2-PH/2;
  ball=makeBall(1);paused=true;running=true;
  document.getElementById('score-h').textContent='0';
  document.getElementById('score-g').textContent='0';
  document.getElementById('lbl-h').textContent=isHost?currentNick+' ◀':'OPPONENT';
  document.getElementById('lbl-g').textContent=isHost?'OPPONENT':currentNick+' ▶';
  setGStatus('PRESS SPACE');
  show('screen-game');

  // Opponent paddle listener
  const oppRole=isHost?'guest':'host';
  if(inputUnsub){inputUnsub();inputUnsub=null;}
  inputUnsub=onValue(inputRef(roomId,oppRole),snap=>{
    const y=snap.val();if(y==null)return;
    if(isHost)guestY=y;else hostY=y;
  });

  // Guest: listen to host state
  if(!isHost){
    if(stateUnsub){stateUnsub();stateUnsub=null;}
    stateUnsub=onValue(stateRef(roomId),snap=>{
      const s=snap.val();if(!s||!running)return;
      ball={x:s.bx,y:s.by,vx:s.bvx,vy:s.bvy,spd:s.bspd};
      hostY=s.hy;
      if(scoreH!==s.sh||scoreG!==s.sg){scoreH=s.sh;scoreG=s.sg;updateScores();}
      paused=s.paused;
      if(s.status!=null)setGStatus(s.status);
      if(running&&(scoreH>=WIN||scoreG>=WIN)){running=false;cancelAnimationFrame(rafId);showWin();}
    });
  }

  // Signal listener (rematch / bye)
  if(signalUnsub){signalUnsub();signalUnsub=null;}
  signalUnsub=onValue(ref(db,`rooms/${roomId}/signal`),snap=>{
    const v=snap.val();if(!v)return;
    if(v==='rematch-1'&&rematchVotes===0){rematchVotes=1;document.getElementById('wbtn-rematch').textContent='WAITING...';}
    if(v==='rematch-2')restartGame();
    if(v==='bye'){running=false;cancelAnimationFrame(rafId);setGStatus('OPPONENT LEFT');}
  });

  cancelAnimationFrame(rafId);
  lastTick=performance.now();accumulator=0;
  rafId=requestAnimationFrame(loop);
}

function restartGame(){
  scoreH=0;scoreG=0;rematchVotes=0;
  myY=H/2-PH/2;hostY=H/2-PH/2;guestY=H/2-PH/2;
  ball=makeBall(1);paused=true;running=true;
  document.getElementById('score-h').textContent='0';
  document.getElementById('score-g').textContent='0';
  document.getElementById('wbtn-rematch').textContent='REMATCH';
  setGStatus('PRESS SPACE');
  show('screen-game');
  update(ref(db,`rooms/${roomId}`),{signal:null});
  cancelAnimationFrame(rafId);
  lastTick=performance.now();accumulator=0;
  rafId=requestAnimationFrame(loop);
}

window.leaveGame=function(){
  running=false;cancelAnimationFrame(rafId);
  if(stateUnsub){stateUnsub();stateUnsub=null;}
  if(inputUnsub){inputUnsub();inputUnsub=null;}
  if(signalUnsub){signalUnsub();signalUnsub=null;}
  if(roomId)update(ref(db,`rooms/${roomId}`),{signal:'bye'});
  clearInterval(publicInterval);
  show('screen-lobby');
  setStatus('Back in lobby.','');
};

// ─── Loop ────────────────────────────────────────────
function loop(now){
  if(!running){draw();return;}
  const dt=Math.min(now-lastTick,100);lastTick=now;
  if(!paused){
    accumulator+=dt;
    while(accumulator>=TICK){tick();accumulator-=TICK;}
  }
  // Send my paddle every frame
  set(inputRef(roomId,myRole),myY);
  draw();
  rafId=requestAnimationFrame(loop);
}

function applyInput(){
  const spd=6;
  const up  = keys['ArrowUp']   || touchState.up;
  const down= keys['ArrowDown'] || touchState.down;
  if(up   && myY>0)      myY-=spd;
  if(down && myY<H-PH)   myY+=spd;
  if(isHost)hostY=myY; else guestY=myY;
}

// Host-only physics
function tick(){
  applyInput();
  if(!isHost)return;

  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<=0)    {ball.y=0;    ball.vy= Math.abs(ball.vy);}
  if(ball.y+BS>=H) {ball.y=H-BS; ball.vy=-Math.abs(ball.vy);}

  function hit(px,py,side){
    if(ball.x+BS>px&&ball.x<px+PW&&ball.y+BS>py&&ball.y<py+PH){
      const rel=(ball.y+BS/2-py)/PH;
      const ang=(rel-0.5)*Math.PI*0.6;
      ball.spd=Math.min(ball.spd+0.3,15);
      ball.vx=side*ball.spd*Math.cos(ang);
      ball.vy=ball.spd*Math.sin(ang);
      ball.x=(side===1)?px+PW:px-BS;
    }
  }
  hit(20,       hostY,  1);
  hit(W-20-PW,  guestY,-1);

  let scored=false;
  if(ball.x+BS<0){scoreG++;scored=true;if(!checkWin()){ball=makeBall(1); paused=true;setGStatus('PRESS SPACE');}}
  if(ball.x>W)   {scoreH++;scored=true;if(!checkWin()){ball=makeBall(-1);paused=true;setGStatus('PRESS SPACE');}}
  if(scored)updateScores();

  set(stateRef(roomId),{
    bx:ball.x,by:ball.y,bvx:ball.vx,bvy:ball.vy,bspd:ball.spd,
    hy:hostY,sh:scoreH,sg:scoreG,
    paused,status:document.getElementById('g-status').textContent
  });
}

function togglePause(){
  if(!running)return;
  paused=!paused;setGStatus(paused?'PAUSED':'');
  if(isHost)set(stateRef(roomId),{
    bx:ball.x,by:ball.y,bvx:ball.vx,bvy:ball.vy,bspd:ball.spd,
    hy:hostY,sh:scoreH,sg:scoreG,paused,status:paused?'PAUSED':''
  });
}

function updateScores(){
  document.getElementById('score-h').textContent=scoreH;
  document.getElementById('score-g').textContent=scoreG;
}

function checkWin(){
  if(scoreH>=WIN||scoreG>=WIN){
    running=false;cancelAnimationFrame(rafId);
    set(stateRef(roomId),{bx:ball.x,by:ball.y,bvx:0,bvy:0,bspd:0,hy:hostY,sh:scoreH,sg:scoreG,paused:true,status:''});
    // Save stats
    saveStats(scoreH>=WIN);
    showWin();return true;
  }
  return false;
}

// ─── Stats saving ────────────────────────────────────
async function saveStats(iWon){
  if(!currentUser)return;
  const snap=await get(ref(db,`users/${currentUser.uid}`));
  const d=snap.val()||{wins:0,losses:0};
  const wins=(d.wins||0)+(iWon?1:0);
  const losses=(d.losses||0)+(iWon?0:1);
  await update(ref(db,`users/${currentUser.uid}`),{wins,losses});
}

function showWin(){
  const iWon=isHost?(scoreH>=WIN):(scoreG>=WIN);
  document.getElementById('win-title').textContent=iWon?'YOU WIN!':'YOU LOSE!';
  document.getElementById('win-score').textContent=scoreH+' — '+scoreG;
  document.getElementById('wbtn-rematch').textContent='REMATCH';
  show('screen-win');
}

window.requestRematch=function(){
  rematchVotes++;
  const val=rematchVotes>=2?'rematch-2':'rematch-1';
  update(ref(db,`rooms/${roomId}`),{signal:val});
  if(rematchVotes>=2)restartGame();
  else document.getElementById('wbtn-rematch').textContent='WAITING...';
};

// ─── Draw ────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,12]);ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#fff';
  ctx.fillRect(20,      hostY, PW,PH);
  ctx.fillRect(W-20-PW, guestY,PW,PH);
  if(ball)ctx.fillRect(Math.round(ball.x),Math.round(ball.y),BS,BS);
}
draw();

// Hide desktop hint on touch devices
if(window.matchMedia('(pointer:coarse)').matches){
  document.getElementById('desktop-hint').style.display='none';
}
</script>
