<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PONG</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;padding:16px;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%;max-width:340px;}
  h1{font-size:clamp(56px,18vw,100px);font-weight:900;letter-spacing:clamp(8px,3vw,16px);}
  .sub{font-size:11px;color:#555;letter-spacing:4px;margin-top:-14px;}

  /* user bar */
  .user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;padding:8px 12px;border:1px solid #222;font-size:11px;}
  .user-nick{letter-spacing:1px;}
  .user-actions{display:flex;gap:10px;}
  .user-link{color:#888;text-decoration:none;letter-spacing:1px;font-size:10px;}
  .user-link:hover{color:#fff;}

  .mode-btn{
    width:100%;padding:16px;font-family:monospace;font-size:14px;font-weight:700;
    letter-spacing:3px;cursor:pointer;text-decoration:none;display:block;text-align:center;
    transition:background .1s;
  }
  .mode-btn.solid{background:#fff;color:#000;border:none;}
  .mode-btn.solid:hover{background:#ccc;}
  .mode-btn.outline{background:#000;color:#fff;border:2px solid #fff;}
  .mode-btn.outline:hover{background:#fff;color:#000;}
  .mode-btn.dim{background:#000;color:#555;border:2px solid #333;}
  .mode-btn.dim:hover{border-color:#fff;color:#fff;}

  .hint{font-size:10px;color:#444;letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">

  <h1>PONG</h1>
  <p class="sub">SELECT MODE</p>

  <!-- User bar (shown when logged in) -->
  <div class="user-bar" id="user-bar" style="display:none">
    <span class="user-nick" id="bar-nick">—</span>
    <div class="user-actions">
      <a href="leaderboard.html" class="user-link">RANK</a>
      <a href="#" class="user-link" id="btn-signout">SIGN OUT</a>
    </div>
  </div>

  <a class="mode-btn solid" href="bot.html">VS BOT</a>
  <a class="mode-btn outline" href="local.html">LOCAL 2P</a>
  <a class="mode-btn outline" href="online.html" id="btn-online">ONLINE 2P</a>
  <a class="mode-btn dim" href="leaderboard.html">LEADERBOARD</a>

  <p class="hint" id="auth-hint">Sign in to save your stats</p>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyDyZcVPRTMk8_k0Kr_prqNZ6bZlbGq1oV4",
  authDomain:"pong-online-18210.firebaseapp.com",
  databaseURL:"https://pong-online-18210-default-rtdb.firebaseio.com",
  projectId:"pong-online-18210",
  storageBucket:"pong-online-18210.firebasestorage.app",
  messagingSenderId:"897676900222",
  appId:"1:897676900222:web:7933fd119d9b573b9d252f"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

onAuthStateChanged(auth,async user=>{
  if(user){
    const snap=await get(ref(db,`users/${user.uid}`));
    const nick=(snap.val()&&snap.val().nickname)||user.displayName||'Player';
    document.getElementById('user-bar').style.display='flex';
    document.getElementById('bar-nick').textContent=nick;
    document.getElementById('auth-hint').style.display='none';
  } else {
    document.getElementById('user-bar').style.display='none';
    document.getElementById('auth-hint').textContent='Sign in to save your stats';
    document.getElementById('auth-hint').style.display='block';
  }
});

document.getElementById('btn-signout').onclick=async e=>{
  e.preventDefault();
  await signOut(auth);
};

// Online button → require auth
document.getElementById('btn-online').onclick=e=>{
  const user=auth.currentUser;
  if(!user){
    e.preventDefault();
    sessionStorage.setItem('auth_redirect','online.html');
    window.location.href='auth.html';
  }
};
</script>
</body>
</html>
